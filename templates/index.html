<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdeliver.net/npm/chart.js"></script>
<style>
    body{
            background:linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
    }
    .card{
            animation:fadeIn 1s ease;
    }
    @keyframes fadeIn{
        from{opacity:0;transform:translateY(20px);}
        to{opacity:1;}
    }    
</style>
</head>
<body class="bg-light p-5 d-flex justify-content-center align-items-center">
    <div class="card p-4" style="width:550px;","height:500px;">
        <form action="/submit" method="POST">
        <input class="form-control mb-2" name="name" placeholder="Name" required>
        <input class="form-control mb-2" name="email" placeholder="Email" required>
        <select class="form-control mb-2" name="rating" required>
        <option value="">Rating</option>
        <option>1</option>
        <option>2</option>
        <option>3</option><option>4</option><option>5</option>
        </select>
        <textarea  name="comment" class="form-control mb-3" ></textarea> 
        <button class="btn btn-dark w-100">Submit</button>

        </form>   
    </div>
</body>
</html>
