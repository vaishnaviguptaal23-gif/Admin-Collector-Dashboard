<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
}  
.card{
    border-radius: 15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}  
table{
    background:white;
    color:black;
}
</style>
</head>
<body class="p-4 bg-light">
<div class="container">
<h2 class="text-center mb-4">Dashboard</h2>
<div class="row mb-4 text-center">
<div class="col-md-6"><div class="card p-3">Total:{{total}}</div></div>   
<div class="col-md-6"><div class="card p-3">Average:{{avg}}</div></div>
</div>

<div class="card p-3 mb-4">
<b>AI Insight:</b> 
<div style="white-space: pre-line;">
    {{ insight|safe }}
</div>
</div>  
<div class="card p-3 mb-4">
<button onclick="showBar()" class="btn btn-primary">Bar</button>  
<button onclick="showPie()" class="btn btn-success">Pie</button>  
<canvas id="chart"></canvas>
</div>
<input type="text" id="search" class="form-control mb-3" placeholder="Search....">
<table class="table table-striped" id="table">
<tr>
<th>Name</th>
<th>Email</th>
<th>Rating</th>
<th>Comment</th>
</tr> 
{% for r in rows %}
<tr>
<td>{{r.name}}</td>
<td>{{r.email}}</td>
<td>{{r.rating}}</td>
<td>{{r.comment if r.comment else "No Comment"}}</td>


</tr>  
{% endfor %}
</table>
<div class="card p-3 mt-4">
<h5> AI Chatbot</h5>
<input id="msg" class="form-control mb-2">
<button onclick="send()" class="btn btn-dark">Send</button>
<p id="chat"></p>
</div>

</div>

<script id="ratings-data" type="application/json">
    {{ratings|tojson}}
</script>
<script>
    
let ratings = JSON.parse(document.getElementById('ratings-data').textContent);
let count = [0,0,0,0,0];

ratings.forEach(r => count[r-1]++);

let chart;

function showBar(){
    if(chart) chart.destroy();
    chart = new Chart(document.getElementById('chart'),{
        type:'bar',
        data:{
            labels:['1','2','3','4','5'],
            datasets:[{data:count}]
        },
        options:{animation:{duration:1000}
    }
    });
}

function showPie(){
    if(chart) chart.destroy();
    chart = new Chart(document.getElementById('chart'),{
        type:'pie',
        data:{
            labels:['1','2','3','4','5',"distribution-ratings"],
            datasets:[{data:count}]
        }
    });
}

showBar();

document.getElementById("search").addEventListener("keyup", function(){
    let val = this.value.toLowerCase();
    let rows = document.querySelectorAll("#table tr");

    rows.forEach((r,i)=>{
        if(i===0) return;
        r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none";
    });
});
function send(){
let msg=document.getElementById("msg").value;

fetch('/chat',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({message:msg})
})
.then(res=>res.json())
.then(data=>{
document.getElementById("chat").innerText="AI: "+data.response;
});
}


</script>
</body>
</html>
